name: zcvios-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: ci-nextauth-secret-zcvios
      NEXTAUTH_URL: http://localhost:3000
      REACT_APP_BACKEND_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Install dependencies
        run: npm ci

      - name: Prepare env
        run: |
          cp .env.example .env.local
          python - <<'PY'
          from pathlib import Path
          p = Path('.env.local')
          s = p.read_text()
          s = s.replace('NEXTAUTH_SECRET=', 'NEXTAUTH_SECRET=ci-nextauth-secret-zcvios')
          p.write_text(s)
          PY

      - name: Run DB migrations and seed
        run: |
          npx prisma migrate deploy
          npm run seed

      - name: Lint
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          fi

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm run dev > /tmp/zcvios_frontend.log 2>&1 &
          echo $! > /tmp/zcvios_frontend.pid

      - name: Wait for app
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Test
        run: |
          if npm run | grep -q " test"; then
            npm test
          fi

      - name: Print frontend logs on failure
        if: failure()
        run: cat /tmp/zcvios_frontend.log || true

      - name: Stop app
        if: always()
        run: kill "$(cat /tmp/zcvios_frontend.pid)" >/dev/null 2>&1 || true

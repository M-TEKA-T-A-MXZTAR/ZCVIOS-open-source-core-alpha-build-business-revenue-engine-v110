name: zcvios-ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: ci-nextauth-secret-zcvios
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run seed

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: ci-nextauth-secret-zcvios
      NEXTAUTH_URL: http://localhost:3001
      REACT_APP_BACKEND_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run seed

      - name: Build application
        env:
          NODE_ENV: production
        run: npm run build

      - name: Start application
        run: |
          PORT=3001 npm start > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for application
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001 >/dev/null 2>&1; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for app... attempt $i"
            sleep 2
          done
          echo "Application failed to start"
          cat /tmp/app.log
          exit 1

      - name: Run integration tests
        run: python -m pytest -v tests/

      - name: Print logs on failure
        if: failure()
        run: cat /tmp/app.log || true

      - name: Stop application
        if: always()
        run: kill "$(cat /tmp/app.pid)" 2>/dev/null || true

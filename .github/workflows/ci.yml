name: zcvios-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: ci-nextauth-secret-zcvios
      NEXTAUTH_URL: http://localhost:3000/auth
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "false"
      REACT_APP_BACKEND_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Prepare database and seed
        working-directory: frontend
        run: |
          yarn prisma generate
          yarn prisma db push
          node prisma/seed.mjs

      - name: Lint frontend
        working-directory: frontend
        run: yarn lint

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      - name: Start frontend server
        working-directory: frontend
        run: |
          yarn start > /tmp/zcvios_frontend.log 2>&1 &
          echo $! > /tmp/zcvios_frontend.pid

      - name: Wait for app
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          cat /tmp/zcvios_frontend.log
          exit 1

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run RPC auth guard tests
        working-directory: backend
        run: pytest -q tests/test_rpc_auth_guards.py

      - name: Run RPC authenticated flow tests
        working-directory: backend
        run: pytest -q tests/test_rpc_authenticated_flows.py

      - name: Print frontend logs on failure
        if: failure()
        run: cat /tmp/zcvios_frontend.log
